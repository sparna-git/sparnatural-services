log:
  directory: ./logs
projects:
  dbpedia-en:
    shacl: ./config/dbpedia-en/config.ttl
    sparqlEndpoint: https://dbpedia.org/sparql
    reconcileStrategy: sparql-only
    domains:
      - sparna-git.github.io
    cache:
      urilookup: ./cache/dbpedia-en/urilookup_cache.json
    reconciliation:
      implementation: SparqlReconcileServiceV13
      cacheSize: 1000
      maxResults: 2
    text2query:
      implementation: MistralText2QueryService
      agentId: ag_019c8a5149a076f48d90b303514760d6
    query2text:
      implementation: MistralQuery2TextService
      agentId: ag_019c8b1bad56750d95e1b91e7d2a8ce8
    t2qPromptGenerator:
      implementation: T2QPromptGenerator
      additionalInstructions: ./config/dbpedia-en/additionalInstructions.txt
    q2tPromptGenerator:
      implementation: Q2TPromptGenerator
  demo-ep:
    shacl: ./config/demo-ep/config-1.ttl ./config/demo-ep/config-2.ttl
    sparqlEndpoint: http://graphdb.sparna.fr/repositories/endorse2025
    reconcileStrategy: sparql-only
    domains:
      - sparna-git.github.io
    cache:
      urilookup: ./cache/demo-ep/urilookup_cache.json
    reconciliation:
      implementation: SparqlReconcileService
      cacheSize: 1000
      maxResults: 2
    text2query:
      implementation: MistralText2QueryService
      agentId: ag:33fd9714:20251002:t2q-org-ep:e1a9d878
    query2text:
      implementation: MistralQuery2TextService
      agentId: ag:33fd9714:20250507:untitled-agent:d1fc8155
    t2qPromptGenerator:
      implementation: T2QPromptGenerator
      additionalInstructions: ./config/demo-ep/additionalInstructions.txt
    q2tPromptGenerator:
      implementation: Q2TPromptGenerator
  ruim:
    shacl: ./config/ruim/sparnatural-config.ttl
    sparqlEndpoint: https://data.sparna.fr/graphdb/repositories/RUIM
    reconcileStrategy: sparql-only
    domains:
      - sparna-git.github.io
    cache:
      urilookup: ./cache/ruim/urilookup_cache.json
    reconciliation:
      implementation: LuceneGraphDBReconcileService
      cacheSize: 1000
      maxResults: 10
      indexCachePath: ./cache/ruim/lunr-index.json
      sparqlQuery: |
        PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
        PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
        PREFIX med: <http://data.esante.gouv.fr/ansm/medicament/>

        SELECT ?entity ?label WHERE {
          {
            # Labels principaux — toutes les entités avec rdfs:label (hors espace ATC)
            ?entity rdfs:label ?label .
            FILTER(LANG(?label) = "fr" || LANG(?label) = "")
            FILTER(!STRSTARTS(STR(?entity), "http://data.esante.gouv.fr/whocc/atc/"))
          }
          UNION
          {
            # Synonymes — skos:altLabel sur Substances et Présentations
            ?entity skos:altLabel ?label .
            FILTER(LANG(?label) = "fr" || LANG(?label) = "")
          }
          UNION
          {
            ?spec med:classificationATC ?entity .
            ?spec med:codeATC ?code .
            ?spec med:libelleATC ?libelleAtc .
            BIND(CONCAT(STR(?code), " - ", STR(?libelleAtc)) AS ?label)
          }
        }
    text2query:
      implementation: MistralText2QueryService
      agentId: ag_019dbabf106875a7a0a8904017d7e93f
    query2text:
      implementation: MistralQuery2TextService
      agentId: ag_019cdc2f1d59758e84c7ff1de49a15c6
    t2qPromptGenerator:
      implementation: T2QPromptGenerator
      additionalInstructions: ./config/ruim/additionalInstructions.txt
    q2tPromptGenerator:
      implementation: Q2TPromptGenerator
  isidore:
    shacl: ./config/isidore/isidore-shapes.ttl
    sparqlEndpoint: https://isidore-ref.huma-num.fr/sparql
    reconcileStrategy: isidore-api
    domains:
      - sparna-git.github.io
    cache:
      urilookup: ./cache/isidore/urilookup_cache.json
    reconciliation:
      implementation: SparqlReconcileService
      cacheSize: 500
      maxResults: 4
  ruim-mcp:
    shacl: ./config/ruim/RUIM-SHACL-instances.ttl
    sparqlEndpoint: https://data.sparna.fr/graphdb/repositories/RUIM
    reconcileStrategy: sparql-only
    domains:
      - sparna-git.github.io
    cache:
      urilookup: ./cache/ruim/urilookup_cache.json
    reconciliation:
      implementation: LunrReconcileService
      cacheSize: 1000
      maxResults: 10
      indexCachePath: ./cache/ruim/lunr-index.json
      sparqlQuery: |
        PREFIX rdfs: <http://www.w3.org/2000/01/rdf-schema#>
        PREFIX skos: <http://www.w3.org/2004/02/skos/core#>
        PREFIX med: <http://data.esante.gouv.fr/ansm/medicament/>

        SELECT ?entity ?label WHERE {
          {
            # Labels principaux — toutes les entités avec rdfs:label (hors espace ATC)
            ?entity rdfs:label ?label .
            FILTER(LANG(?label) = "fr" || LANG(?label) = "")
            FILTER(!STRSTARTS(STR(?entity), "http://data.esante.gouv.fr/whocc/atc/"))
          }
          UNION
          {
            # Synonymes — skos:altLabel sur Substances et Présentations
            ?entity skos:altLabel ?label .
            FILTER(LANG(?label) = "fr" || LANG(?label) = "")
          }
          UNION
          {
            # Entités ATC : URIs sans triplets propres, labels dénormalisés sur les Spécialités.
            # Format Sparnatural : "CODE - libellé"
            ?spec med:classificationATC ?entity .
            ?spec med:codeATC ?code .
            ?spec med:libelleATC ?libelleAtc .
            BIND(CONCAT(STR(?code), " - ", STR(?libelleAtc)) AS ?label)
          }
        }
    t2qPromptGenerator:
      implementation: T2QPromptGenerator
      additionalInstructions: ./config/ruim/additionalInstructions.txt
    q2tPromptGenerator:
      implementation: Q2TPromptGenerator
